<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Foxglove visualization demo</title>
  <desc id="desc">Animated visualization dashboard illustration inspired by Foxglove.</desc>
  <defs>
    <linearGradient id="dashbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .panel { fill: rgba(15, 23, 42, 0.92); stroke: rgba(148, 163, 184, 0.18); stroke-width: 1.4; }
      .small { font: 15px 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .label { font: 18px 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .muted { fill: #94a3b8; }
      .axis { stroke: #475569; stroke-width: 2; }
      .curveA, .curveB { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .curveA { stroke: #7dd3fc; stroke-dasharray: 440; stroke-dashoffset: 440; animation: draw 4.8s ease-in-out infinite; }
      .curveB { stroke: #22c55e; stroke-dasharray: 440; stroke-dashoffset: 440; animation: draw 4.8s ease-in-out 0.9s infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; }
      .dotA { fill: #7dd3fc; animation: moveA 4.8s linear infinite; }
      .dotB { fill: #22c55e; animation: moveB 4.8s linear infinite; }
      .arm { transform-origin: 180px 250px; animation: sway 3.4s ease-in-out infinite; }
      @keyframes draw {
        0% { stroke-dashoffset: 440; opacity: 0.35; }
        22%, 78% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-4deg); }
        50% { transform: rotate(4deg); }
      }
      @keyframes moveA {
        0% { transform: translate(0px, 0px); opacity: 0; }
        8% { opacity: 1; }
        100% { transform: translate(206px, -128px); opacity: 1; }
      }
      @keyframes moveB {
        0% { transform: translate(0px, 0px); opacity: 0; }
        8% { opacity: 1; }
        100% { transform: translate(210px, 62px); opacity: 1; }
      }
    </style>
  </defs>

  <rect x="48" y="36" width="864" height="488" rx="26" fill="url(#dashbg)" filter="url(#shadow2)"/>
  <rect x="48" y="36" width="864" height="56" rx="26" fill="#020617"/>
  <text x="86" y="70" class="label">Foxglove Runtime Visualization</text>
  <text x="702" y="70" class="small muted">ws://localhost:8765</text>

  <rect x="78" y="118" width="260" height="322" rx="18" class="panel"/>
  <text x="102" y="152" class="small">3D Scene</text>
  <line x1="154" y1="318" x2="210" y2="318" stroke="#ef4444" stroke-width="5"/>
  <line x1="154" y1="318" x2="154" y2="254" stroke="#22c55e" stroke-width="5"/>
  <line x1="154" y1="318" x2="120" y2="352" stroke="#38bdf8" stroke-width="5"/>
  <g class="arm">
    <path d="M154 318 L186 272 L222 244 L252 210" fill="none" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="186" cy="272" r="8" fill="#94a3b8"/>
    <circle cx="222" cy="244" r="8" fill="#94a3b8"/>
    <circle cx="252" cy="210" r="8" fill="#f8fafc"/>
  </g>
  <path d="M252 210 C274 180 298 170 312 176" fill="none" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8 8" class="pulse"/>
  <circle cx="312" cy="176" r="10" fill="#f97316" class="pulse"/>

  <rect x="366" y="118" width="514" height="154" rx="18" class="panel"/>
  <text x="390" y="152" class="small">Controller Debug</text>
  <line x1="398" y1="234" x2="838" y2="234" class="axis"/>
  <line x1="398" y1="176" x2="398" y2="246" class="axis"/>
  <path d="M410 222 C450 200 490 206 526 188 S602 150 642 172 S730 214 780 164 S832 136 852 146" class="curveA"/>
  <path d="M410 214 C456 212 492 190 532 204 S616 246 664 228 S764 180 806 206 S842 214 852 210" class="curveB"/>

  <rect x="366" y="288" width="250" height="152" rx="18" class="panel"/>
  <text x="390" y="322" class="small">Planner / Mode</text>
  <rect x="392" y="342" width="88" height="28" rx="14" fill="#1d4ed8" opacity="0.9"/>
  <text x="415" y="361" class="small">SE3</text>
  <rect x="494" y="342" width="92" height="28" rx="14" fill="#15803d" opacity="0.9"/>
  <text x="520" y="361" class="small">HQP</text>
  <text x="392" y="398" class="small muted">ModeState: HQP_SE3</text>
  <text x="392" y="424" class="small muted">has_active_point: true</text>

  <rect x="630" y="288" width="250" height="152" rx="18" class="panel"/>
  <text x="654" y="322" class="small">Tracking Preview</text>
  <line x1="668" y1="406" x2="822" y2="278" stroke="#7dd3fc" stroke-width="4" stroke-dasharray="10 8"/>
  <line x1="668" y1="406" x2="824" y2="452" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8"/>
  <circle cx="668" cy="406" r="7" class="dotA"/>
  <circle cx="668" cy="406" r="7" class="dotB"/>
  <text x="652" y="430" class="small muted">Reference / EE trajectory / wrench</text>
</svg>
