site_name: Franka Experiment Documentation
site_description: Franka ROS1 / On-Orbit 架构 2.0 文档
site_url: "https://ming751.github.io/franka_experiment_ming_docs/"
repo_url: "https://github.com/ming751/franka_experiment_ming_docs"
repo_name: "ming751/franka_experiment_ming_docs"

docs_dir: docs

theme:
  name: material
  language: zh
  icon:
    logo: material/robot-industrial
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ming751/franka_experiment_ming_docs

copyright: "&copy; 2024 – 2026 Ming · Franka On-Orbit 2.0"

extra_css:
  - assets/stylesheets/home.css

nav:
  - 首页: index.md
  - 架构总览: architecture.md
  - 手动实验与调试: commands.md
  - 数据与绘图: plotting.md
  - 状态码与消息字典: reference.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
