site_name: Franka Experiment Documentation
site_description: Franka ROS1 / On-Orbit 架构 2.0 文档
site_url: "https://ming751.github.io/franka_experiment_ming_docs/"
repo_url: "https://github.com/ming751/franka_experiment_ming_docs"
repo_name: "ming751/franka_experiment_ming_docs"

docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - toc.follow
    - content.code.copy

extra_css:
  - assets/stylesheets/home.css

nav:
  - 首页: index.md
  - 架构总览: architecture.md
  - 模块说明: packages.md
  - 运行与命令: commands.md
  - 绘图与后处理: plotting.md
  - 模式与状态映射: mode-and-status.md
  - 观测与日志: observability.md
  - Debug Topics: debug-topics.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
