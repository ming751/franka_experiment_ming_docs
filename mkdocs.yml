site_name: Franka Experiment Documentation
site_description: Franka ROS1 / On-Orbit 架构 2.0 文档
site_url: ""
repo_url: "https://github.com/ming751/franka_experiment_ming_docs"
repo_name: "ming751/franka_experiment_ming_docs"

docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - toc.follow
    - content.code.copy

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 架构总览: architecture.md
  - 模块说明: packages.md
  - 运行与命令: commands.md
  - 绘图与后处理: plotting.md
  - 模式与状态映射: mode-and-status.md
  - 观测与日志: observability.md
  - Debug Topics: debug-topics.md
  - 文档维护: docs-workflow.md
  - 设计记录:
      - 真机模块化计划: real_robot_modularization_plan.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
